<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - CareSync</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-stethoscope"></i> CareSync Pro
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="active"><i class="fa-solid fa-users"></i> Patients & Appointments</a></li>
                <li><a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h2 id="welcomeText">Doctor Admin Panel</h2>
                    <p class="text-muted">Manage all patient records and appointments</p>
                </div>
                <div class="user-profile">
                    <span class="badge badge-primary" style="background:var(--primary);color:white">Admin</span>
                    <div class="avatar">D</div>
                </div>
            </header>

            <!-- All Appointments Section -->
            <section class="card-panel">
                <div class="card-header">
                    <h3>All Appointments</h3>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Patient Name</th>
                                <th>Patient ID</th>
                                <th>Date & Time</th>
                                <th>Reason</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="allAppointmentsBody">
                            <tr><td colspan="6">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/doctor.js"></script>
</body>
</html>
