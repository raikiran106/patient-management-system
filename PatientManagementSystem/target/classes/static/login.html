<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareSync</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-user-doctor" id="loginIcon" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
                <h2 id="loginTitle">Login</h2>
                <p class="text-muted">Enter your credentials to access your portal</p>
                <div style="margin-top:0.5rem; font-size:0.8rem;background:#e0fbfc;padding:5px;border-radius:5px;display:none" id="hint"></div>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">User ID / Username</label>
                    <input type="text" id="username" class="form-control" placeholder="e.g. PT001 or admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div id="loginError" class="alert alert-danger hidden"></div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
            <div class="auth-footer">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role') || 'PATIENT';
            document.getElementById('loginTitle').innerText = role === 'DOCTOR' ? 'Doctor / Admin Login' : 'Patient Login';
            if(role==='DOCTOR') {
                document.getElementById('hint').style.display='block';
                document.getElementById('hint').innerText='Hint: admin / admin123';
                document.getElementById('loginIcon').className = 'fa-solid fa-user-shield';
            } else {
                document.getElementById('hint').style.display='block';
                document.getElementById('hint').innerText='Hint: PT001 / password';
            }
            
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                handleLogin(role);
            });
        });
    </script>
</body>
</html>
